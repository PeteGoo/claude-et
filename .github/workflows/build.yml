name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-manager:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build

      - name: Copy UI dist into manager
        run: cp -r ui/dist manager/ui-dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push manager image
        uses: docker/build-push-action@v6
        with:
          context: ./manager
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-manager:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-manager:${{ github.sha }}

  build-session-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base session image
        uses: docker/build-push-action@v6
        with:
          context: ./images/base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-session-base:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-session-base:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-session:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-session:${{ github.sha }}

  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base session image for testing
        uses: docker/build-push-action@v6
        with:
          context: ./images/base
          push: false
          tags: claude-et-session-base:test

      - name: Install manager dependencies
        working-directory: manager
        run: npm install

      - name: Run integration tests
        working-directory: manager
        run: npm run test:integration

  build-session-dotnet:
    needs: build-session-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dotnet session image
        uses: docker/build-push-action@v6
        with:
          context: ./images/dotnet
          push: true
          build-args: |
            BASE_TAG=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-session-dotnet:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-et-session-dotnet:${{ github.sha }}
